<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrazyRoosterGames Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff0000, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 1.2em;
            color: #aaa;
            margin-bottom: 40px;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .tool-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .tool-card:hover {
            background: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.3);
            transform: translateY(-5px);
        }
        .tool-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        .tool-name {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .tool-desc {
            color: #aaa;
            font-size: 0.95em;
            margin-bottom: 20px;
        }
        .tool-link {
            display: inline-block;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            padding: 10px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tool-link:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 0, 0, 0.3);
        }
        .footer {
            color: #666;
            font-size: 0.9em;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 CrazyRoosterGames</h1>
        <p class="subtitle">Creative Game Development Tools</p>
        
        <div class="tools-grid">
            <div class="tool-card">
                <div class="tool-icon">🦴</div>
                <div class="tool-name">3D Poser</div>
                <div class="tool-desc">Advanced character pose editor with bone manipulation, undo/redo, and pose export</div>
                <a href="3dposer.html" class="tool-link">Launch Tool →</a>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2024 CrazyRoosterGames Studio. All rights reserved.</p>
            <p style="margin-top: 10px; color: #555;">Red & White Brand • Game Dev • Content Creation • Web Development</p>
        </div>
    </div>
</body>
</html>
