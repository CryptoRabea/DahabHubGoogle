<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Poser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #1a1a1a; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
        }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #toolbar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            pointer-events: auto;
            background: rgba(30, 30, 30, 0.9);
            padding: 10px 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90vw;
        }
        
        .btn {
            background: linear-gradient(145deg, #3a3a3a, #2a2a2a);
            border: 1px solid #444;
            color: #eee;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .btn:hover { 
            background: linear-gradient(145deg, #4a4a4a, #3a3a3a);
            border-color: #666;
            transform: translateY(-1px);
        }
        .btn:active { transform: translateY(0); }
        .btn.active { 
            background: linear-gradient(145deg, #0066cc, #0055aa);
            border-color: #0088ff;
            color: white;
        }
        .btn.export-btn {
            background: linear-gradient(145deg, #2d6b2d, #1e4d1e);
            border-color: #3a8a3a;
        }
        .btn.export-btn:hover {
            background: linear-gradient(145deg, #3a8a3a, #2d6b2d);
            border-color: #4caf50;
        }
        .btn.undo-redo-btn {
            background: linear-gradient(145deg, #4a3a2a, #3a2a1a);
            border-color: #6a5a4a;
            min-width: 36px;
            text-align: center;
        }
        .btn.undo-redo-btn:hover {
            background: linear-gradient(145deg, #5a4a3a, #4a3a2a);
            border-color: #8a7a6a;
        }
        .btn.undo-redo-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        .toolbar-separator {
            width: 1px;
            background: #444;
            margin: 0 4px;
            align-self: stretch;
        }
        
        #sidebar {
            position: absolute;
            top: 0;
            right: 0;
            width: 240px;
            height: 100%;
            background: rgba(25, 25, 25, 0.95);
            border-left: 1px solid #333;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
        }
        
        #sidebar-title {
            padding: 15px;
            border-bottom: 1px solid #333;
            font-weight: 600;
            color: #fff;
            text-align: center;
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        #bone-search-container {
            padding: 8px 10px;
            border-bottom: 1px solid #333;
        }
        
        #bone-search {
            width: 100%;
            padding: 8px 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 5px;
            color: #eee;
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        #bone-search:focus {
            border-color: #0088ff;
        }
        #bone-search::placeholder {
            color: #666;
        }
        
        #bone-count {
            padding: 4px 10px;
            font-size: 11px;
            color: #666;
            text-align: right;
        }
        
        #bone-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        #bone-list::-webkit-scrollbar {
            width: 6px;
        }
        #bone-list::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        #bone-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        
        .bone-btn {
            padding: 10px 12px;
            margin: 3px 0;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 5px;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            text-align: left;
            display: block;
        }
        .bone-btn:hover { background: #3a3a3a; border-color: #555; color: #fff; }
        .bone-btn.selected { 
            background: #0066cc; 
            border-color: #0088ff; 
            color: white;
        }
        .bone-btn.hidden { display: none; }
        
        #status {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            color: #aaa;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
        }
        
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 25px 40px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            display: none;
        }
        
        #file-input { display: none; }
        
        .instructions {
            position: absolute;
            bottom: 15px;
            right: 255px;
            background: rgba(0,0,0,0.6);
            color: #888;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 11px;
            pointer-events: none;
            line-height: 1.6;
        }
        
        /* Toast notification */
        #toast {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 180, 80, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 999;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* Export dropdown */
        .export-dropdown {
            position: relative;
            display: inline-block;
        }
        .export-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 8px;
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 6px;
            min-width: 160px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .export-menu.show { display: block; }
        .export-menu-item {
            padding: 8px 14px;
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
        }
        .export-menu-item:hover {
            background: #3a3a3a;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="toolbar">
            <button class="btn" id="btn-import">📁 Import</button>
            <input type="file" id="file-input" accept=".glb,.gltf,.obj">
            <div class="toolbar-separator"></div>
            <button class="btn active" id="btn-rotate">🔄 Rotate</button>
            <button class="btn" id="btn-reset">↺ Reset Pose</button>
            <button class="btn" id="btn-focus">🎯 Center</button>
            <div class="toolbar-separator"></div>
            <button class="btn undo-redo-btn" id="btn-undo" disabled title="Undo (Ctrl+Z)">↶</button>
            <button class="btn undo-redo-btn" id="btn-redo" disabled title="Redo (Ctrl+Y)">↷</button>
            <div class="toolbar-separator"></div>
            <div class="export-dropdown">
                <button class="btn export-btn" id="btn-export">💾 Export ▾</button>
                <div class="export-menu" id="export-menu">
                    <div class="export-menu-item" id="export-json">📄 Export Pose (JSON)</div>
                    <div class="export-menu-item" id="export-screenshot">📷 Screenshot (PNG)</div>
                    <div class="export-menu-item" id="import-json">📂 Import Pose (JSON)</div>
                </div>
            </div>
            <input type="file" id="pose-file-input" accept=".json" style="display:none">
        </div>
        
        <div id="sidebar">
            <div id="sidebar-title">🦴 BONE LIST</div>
            <div id="bone-search-container">
                <input type="text" id="bone-search" placeholder="🔍 Search bones..." autocomplete="off">
            </div>
            <div id="bone-count"></div>
            <div id="bone-list"></div>
        </div>
        
        <div id="status">Initializing...</div>
        <div id="loader">
            <div style="font-size: 24px; margin-bottom: 10px;">⏳</div>
            <div id="loader-text">Loading...</div>
        </div>
        <div id="toast"></div>
        
        <div class="instructions">
            🖱️ Click bones to select · Drag to rotate · Scroll to zoom<br>
            ⌨️ Ctrl+Z Undo · Ctrl+Y Redo · Ctrl+S Export
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ============================================================
        // SCENE SETUP
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 5, 20);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 1.5, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 8, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(2048, 2048);
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x4466ff, 0.4);
        fillLight.position.set(-3, 2, -3);
        scene.add(fillLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x222222, 
            roughness: 0.9,
            metalness: 0.1
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid helper
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x333333);
        scene.add(gridHelper);

        // Controls
        const orbit = new OrbitControls(camera, renderer.domElement);
        orbit.target.set(0, 1, 0);
        orbit.enableDamping = true;
        orbit.dampingFactor = 0.05;
        orbit.update();

        const transformControl = new TransformControls(camera, renderer.domElement);
        transformControl.setMode('rotate');
        transformControl.setSpace('local');
        scene.add(transformControl);

        transformControl.addEventListener('dragging-changed', (e) => {
            orbit.enabled = !e.value;
        });

        // ============================================================
        // STATE
        // ============================================================
        let currentModel = null;
        let skeletonHelper = null;
        let boneData = {};
        let initialRotations = {};
        let selectedBoneUuid = null;

        // Undo/Redo system
        const undoStack = [];
        const redoStack = [];
        const MAX_UNDO = 50;
        let isRecordingAction = false;
        let actionStartRotation = null;

        const loader = new GLTFLoader();
        const statusEl = document.getElementById('status');
        const loaderEl = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        const boneListEl = document.getElementById('bone-list');
        const boneSearchEl = document.getElementById('bone-search');
        const boneCountEl = document.getElementById('bone-count');
        const toastEl = document.getElementById('toast');

        // ============================================================
        // UTILITY FUNCTIONS
        // ============================================================
        function showLoader(text) {
            loaderText.textContent = text;
            loaderEl.style.display = 'block';
        }

        function hideLoader() {
            loaderEl.style.display = 'none';
        }

        function showToast(message, duration = 2000) {
            toastEl.textContent = message;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), duration);
        }

        function updateUndoRedoButtons() {
            document.getElementById('btn-undo').disabled = undoStack.length === 0;
            document.getElementById('btn-redo').disabled = redoStack.length === 0;
        }

        function updateBoneCount() {
            const visible = document.querySelectorAll('.bone-btn:not(.hidden)').length;
            const total = document.querySelectorAll('.bone-btn').length;
            if (visible === total) {
                boneCountEl.textContent = `${total} bones`;
            } else {
                boneCountEl.textContent = `${visible} / ${total} bones`;
            }
        }

        // ============================================================
        // UNDO / REDO SYSTEM
        // ============================================================
        function pushUndoAction(boneUuid, oldRotation, newRotation) {
            undoStack.push({
                boneUuid,
                oldRotation: oldRotation.clone(),
                newRotation: newRotation.clone()
            });
            if (undoStack.length > MAX_UNDO) undoStack.shift();
            redoStack.length = 0; // Clear redo on new action
            updateUndoRedoButtons();
        }

        function undo() {
            if (undoStack.length === 0) return;
            const action = undoStack.pop();
            const data = boneData[action.boneUuid];
            if (data) {
                data.bone.rotation.copy(action.oldRotation);
                redoStack.push(action);
                showToast('↶ Undo');
                statusEl.textContent = `Undo: ${data.name}`;
            }
            updateUndoRedoButtons();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const action = redoStack.pop();
            const data = boneData[action.boneUuid];
            if (data) {
                data.bone.rotation.copy(action.newRotation);
                undoStack.push(action);
                showToast('↷ Redo');
                statusEl.textContent = `Redo: ${data.name}`;
            }
            updateUndoRedoButtons();
        }

        // Track transform control actions for undo
        transformControl.addEventListener('mouseDown', () => {
            if (selectedBoneUuid && boneData[selectedBoneUuid]) {
                isRecordingAction = true;
                actionStartRotation = boneData[selectedBoneUuid].bone.rotation.clone();
            }
        });

        transformControl.addEventListener('mouseUp', () => {
            if (isRecordingAction && selectedBoneUuid && boneData[selectedBoneUuid]) {
                const currentRotation = boneData[selectedBoneUuid].bone.rotation.clone();
                if (!actionStartRotation.equals(currentRotation)) {
                    pushUndoAction(selectedBoneUuid, actionStartRotation, currentRotation);
                }
            }
            isRecordingAction = false;
            actionStartRotation = null;
        });

        // ============================================================
        // EXPORT FUNCTIONS
        // ============================================================
        function exportPoseJSON() {
            const poseData = {
                version: '1.0',
                timestamp: new Date().toISOString(),
                bones: {}
            };

            Object.entries(boneData).forEach(([uuid, data]) => {
                poseData.bones[data.name] = {
                    rotation: {
                        x: data.bone.rotation.x,
                        y: data.bone.rotation.y,
                        z: data.bone.rotation.z,
                        order: data.bone.rotation.order
                    },
                    position: {
                        x: data.bone.position.x,
                        y: data.bone.position.y,
                        z: data.bone.position.z
                    }
                };
            });

            const json = JSON.stringify(poseData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pose_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📄 Pose exported as JSON');
            statusEl.textContent = '✓ Pose exported';
        }

        function importPoseJSON(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const poseData = JSON.parse(e.target.result);
                    if (!poseData.bones) throw new Error('Invalid pose file');

                    let applied = 0;
                    Object.entries(poseData.bones).forEach(([name, data]) => {
                        const boneEntry = Object.values(boneData).find(b => b.name === name);
                        if (boneEntry && data.rotation) {
                            // Push undo for each bone change
                            const oldRot = boneEntry.bone.rotation.clone();
                            boneEntry.bone.rotation.set(
                                data.rotation.x,
                                data.rotation.y,
                                data.rotation.z,
                                data.rotation.order || 'XYZ'
                            );
                            const newRot = boneEntry.bone.rotation.clone();
                            if (!oldRot.equals(newRot)) {
                                pushUndoAction(boneEntry.bone.uuid, oldRot, newRot);
                            }
                            applied++;
                        }
                    });

                    showToast(`📂 Pose loaded (${applied} bones applied)`);
                    statusEl.textContent = `✓ Pose imported: ${applied} bones`;
                } catch (err) {
                    showToast('❌ Invalid pose file');
                    statusEl.textContent = '❌ Failed to import pose';
                    console.error(err);
                }
            };
            reader.readAsText(file);
        }

        function exportScreenshot() {
            // Temporarily hide UI elements for clean screenshot
            const uiEl = document.getElementById('ui');
            uiEl.style.display = 'none';

            // Render one frame
            renderer.render(scene, camera);

            // Capture
            const dataURL = renderer.domElement.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = dataURL;
            a.download = `pose_screenshot_${Date.now()}.png`;
            a.click();

            // Restore UI
            uiEl.style.display = '';
            showToast('📷 Screenshot saved');
            statusEl.textContent = '✓ Screenshot exported';
        }

        // ============================================================
        // BONE SEARCH / FILTER
        // ============================================================
        boneSearchEl.addEventListener('input', () => {
            const query = boneSearchEl.value.toLowerCase().trim();
            const buttons = document.querySelectorAll('.bone-btn');
            
            buttons.forEach(btn => {
                const name = btn.textContent.toLowerCase();
                if (query === '' || name.includes(query)) {
                    btn.classList.remove('hidden');
                } else {
                    btn.classList.add('hidden');
                }
            });
            updateBoneCount();
        });

        // ============================================================
        // CREATE FALLBACK ROBOT MODEL
        // ============================================================
        function createRobot() {
            const group = new THREE.Group();
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x0088ff, 
                roughness: 0.4,
                metalness: 0.6
            });

            const hips = new THREE.Bone();
            hips.name = 'Hips';
            
            const spine = new THREE.Bone();
            spine.name = 'Spine';
            spine.position.y = 0.5;
            
            const chest = new THREE.Bone();
            chest.name = 'Chest';
            chest.position.y = 0.4;
            
            const neck = new THREE.Bone();
            neck.name = 'Neck';
            neck.position.y = 0.3;
            
            const head = new THREE.Bone();
            head.name = 'Head';
            head.position.y = 0.2;

            const shoulderL = new THREE.Bone();
            shoulderL.name = 'Shoulder.L';
            shoulderL.position.set(-0.2, 0.35, 0);
            
            const armL = new THREE.Bone();
            armL.name = 'Arm.L';
            armL.position.y = -0.25;
            
            const handL = new THREE.Bone();
            handL.name = 'Hand.L';
            handL.position.y = -0.25;

            const shoulderR = new THREE.Bone();
            shoulderR.name = 'Shoulder.R';
            shoulderR.position.set(0.2, 0.35, 0);
            
            const armR = new THREE.Bone();
            armR.name = 'Arm.R';
            armR.position.y = -0.25;
            
            const handR = new THREE.Bone();
            handR.name = 'Hand.R';
            handR.position.y = -0.25;

            const hipL = new THREE.Bone();
            hipL.name = 'Hip.L';
            hipL.position.set(-0.1, 0, 0);
            
            const legL = new THREE.Bone();
            legL.name = 'Leg.L';
            legL.position.y = -0.35;
            
            const footL = new THREE.Bone();
            footL.name = 'Foot.L';
            footL.position.y = -0.35;

            const hipR = new THREE.Bone();
            hipR.name = 'Hip.R';
            hipR.position.set(0.1, 0, 0);
            
            const legR = new THREE.Bone();
            legR.name = 'Leg.R';
            legR.position.y = -0.35;
            
            const footR = new THREE.Bone();
            footR.name = 'Foot.R';
            footR.position.y = -0.35;

            // Build hierarchy
            hips.add(spine);
            spine.add(chest);
            chest.add(neck);
            neck.add(head);
            
            chest.add(shoulderL);
            shoulderL.add(armL);
            armL.add(handL);
            
            chest.add(shoulderR);
            shoulderR.add(armR);
            armR.add(handR);
            
            hips.add(hipL);
            hipL.add(legL);
            legL.add(footL);
            
            hips.add(hipR);
            hipR.add(legR);
            legR.add(footR);

            // Add visual meshes
            function addMesh(bone, geometry, offset = new THREE.Vector3()) {
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.copy(offset);
                mesh.castShadow = true;
                bone.add(mesh);
            }

            addMesh(spine, new THREE.BoxGeometry(0.25, 0.4, 0.15));
            addMesh(chest, new THREE.BoxGeometry(0.3, 0.25, 0.18));
            addMesh(head, new THREE.SphereGeometry(0.12, 16, 16), new THREE.Vector3(0, 0.05, 0));
            
            addMesh(shoulderL, new THREE.SphereGeometry(0.06, 12, 12));
            addMesh(armL, new THREE.CylinderGeometry(0.04, 0.04, 0.25, 8), new THREE.Vector3(0, -0.12, 0));
            addMesh(handL, new THREE.SphereGeometry(0.05, 12, 12), new THREE.Vector3(0, -0.25, 0));
            
            addMesh(shoulderR, new THREE.SphereGeometry(0.06, 12, 12));
            addMesh(armR, new THREE.CylinderGeometry(0.04, 0.04, 0.25, 8), new THREE.Vector3(0, -0.12, 0));
            addMesh(handR, new THREE.SphereGeometry(0.05, 12, 12), new THREE.Vector3(0, -0.25, 0));
            
            addMesh(hipL, new THREE.SphereGeometry(0.07, 12, 12));
            addMesh(legL, new THREE.CylinderGeometry(0.05, 0.05, 0.35, 8), new THREE.Vector3(0, -0.17, 0));
            addMesh(footL, new THREE.BoxGeometry(0.08, 0.05, 0.12), new THREE.Vector3(0, -0.35, 0.03));
            
            addMesh(hipR, new THREE.SphereGeometry(0.07, 12, 12));
            addMesh(legR, new THREE.CylinderGeometry(0.05, 0.05, 0.35, 8), new THREE.Vector3(0, -0.17, 0));
            addMesh(footR, new THREE.BoxGeometry(0.08, 0.05, 0.12), new THREE.Vector3(0, -0.35, 0.03));

            group.add(hips);
            hips.position.y = 1.0;

            return { scene: group };
        }

        // ============================================================
        // MODEL PROCESSING
        // ============================================================
        function processModel(gltf) {
            // Clean up old model
            if (currentModel) {
                scene.remove(currentModel);
                currentModel.traverse((obj) => {
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material) {
                        if (Array.isArray(obj.material)) {
                            obj.material.forEach(m => m.dispose());
                        } else {
                            obj.material.dispose();
                        }
                    }
                });
            }
            if (skeletonHelper) {
                scene.remove(skeletonHelper);
                skeletonHelper.dispose();
            }

            // Clear undo/redo on new model
            undoStack.length = 0;
            redoStack.length = 0;
            updateUndoRedoButtons();
            selectedBoneUuid = null;

            currentModel = gltf.scene;

            // Normalize model
            const box = new THREE.Box3().setFromObject(currentModel);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            const scale = 1.8 / Math.max(size.y, 0.001);
            currentModel.scale.setScalar(scale);
            currentModel.position.sub(center.multiplyScalar(scale));
            currentModel.position.y = 0;

            // Enable shadows
            currentModel.traverse((obj) => {
                if (obj.isMesh) {
                    obj.castShadow = true;
                    obj.receiveShadow = true;
                }
            });

            // Find bones
            boneData = {};
            initialRotations = {};
            boneListEl.innerHTML = '';

            currentModel.traverse((obj) => {
                if (obj.isBone) {
                    // Create joint marker - LARGER for better clickability
                    const marker = new THREE.Mesh(
                        new THREE.SphereGeometry(0.04, 12, 12),
                        new THREE.MeshBasicMaterial({ 
                            color: 0x00ff88,
                            transparent: true,
                            opacity: 0.6,
                            depthTest: false
                        })
                    );
                    marker.userData.isMarker = true;
                    marker.userData.boneUuid = obj.uuid;
                    obj.add(marker);

                    boneData[obj.uuid] = {
                        bone: obj,
                        marker: marker,
                        name: obj.name || 'Bone_' + obj.id
                    };

                    initialRotations[obj.uuid] = obj.rotation.clone();

                    // Add to UI list
                    const btn = document.createElement('div');
                    btn.className = 'bone-btn';
                    btn.textContent = obj.name || 'Bone_' + obj.id;
                    btn.dataset.uuid = obj.uuid;
                    btn.addEventListener('click', () => selectBone(obj.uuid));
                    boneListEl.appendChild(btn);
                }
            });

            // Create skeleton helper
            skeletonHelper = new THREE.SkeletonHelper(currentModel);
            skeletonHelper.material.linewidth = 2;

            scene.add(currentModel);
            scene.add(skeletonHelper);

            hideLoader();
            updateBoneCount();
            statusEl.textContent = boneListEl.children.length > 0 
                ? `✓ ${boneListEl.children.length} bones found` 
                : '✓ Model loaded (no bones)';
        }

        // ============================================================
        // BONE SELECTION
        // ============================================================
        function selectBone(uuid) {
            const data = boneData[uuid];
            if (!data) return;

            selectedBoneUuid = uuid;
            transformControl.attach(data.bone);

            // Update markers
            Object.values(boneData).forEach(d => {
                d.marker.material.color.setHex(0x00ff88);
                d.marker.material.opacity = 0.6;
                d.marker.scale.setScalar(1);
            });
            data.marker.material.color.setHex(0xff4444);
            data.marker.material.opacity = 1.0;
            data.marker.scale.setScalar(1.5);

            // Update UI list
            document.querySelectorAll('.bone-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.uuid === uuid);
            });

            // Auto-scroll sidebar to selected bone
            const selectedBtn = document.querySelector(`.bone-btn[data-uuid="${uuid}"]`);
            if (selectedBtn) {
                selectedBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            statusEl.textContent = `Selected: ${data.name}`;
        }

        // ============================================================
        // RAYCASTING & HOVER
        // ============================================================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredMarker = null;

        function onPointerDown(e) {
            if (e.target !== renderer.domElement) return;

            const rect = renderer.domElement.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const markers = Object.values(boneData).map(d => d.marker);
            const intersects = raycaster.intersectObjects(markers);

            if (intersects.length > 0) {
                const bone = intersects[0].object.parent;
                selectBone(bone.uuid);
            }
        }

        function onPointerMove(e) {
            if (e.target !== renderer.domElement) return;

            const rect = renderer.domElement.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const markers = Object.values(boneData).map(d => d.marker);
            const intersects = raycaster.intersectObjects(markers);

            // Reset previous hover
            if (hoveredMarker && (!selectedBoneUuid || hoveredMarker.userData.boneUuid !== selectedBoneUuid)) {
                hoveredMarker.material.color.setHex(0x00ff88);
                hoveredMarker.material.opacity = 0.6;
                hoveredMarker.scale.setScalar(1);
            }

            if (intersects.length > 0) {
                const marker = intersects[0].object;
                if (!selectedBoneUuid || marker.userData.boneUuid !== selectedBoneUuid) {
                    marker.material.color.setHex(0xffaa00);
                    marker.material.opacity = 0.9;
                    marker.scale.setScalar(1.3);
                }
                hoveredMarker = marker;
                renderer.domElement.style.cursor = 'pointer';
            } else {
                hoveredMarker = null;
                renderer.domElement.style.cursor = 'default';
            }
        }

        renderer.domElement.addEventListener('pointerdown', onPointerDown);
        renderer.domElement.addEventListener('pointermove', onPointerMove);

        // ============================================================
        // BUTTON HANDLERS
        // ============================================================
        document.getElementById('btn-import').addEventListener('click', () => {
            document.getElementById('file-input').click();
        });

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            showLoader('Importing ' + file.name + '...');
            statusEl.textContent = 'Loading file...';

            const url = URL.createObjectURL(file);
            loader.load(
                url,
                (gltf) => {
                    processModel(gltf);
                    URL.revokeObjectURL(url);
                },
                (progress) => {
                    if (progress.total > 0) {
                        const percent = Math.round((progress.loaded / progress.total) * 100);
                        loaderText.textContent = `Loading... ${percent}%`;
                    }
                },
                (error) => {
                    console.error(error);
                    hideLoader();
                    statusEl.textContent = '❌ Error loading file';
                }
            );
        });

        document.getElementById('btn-rotate').addEventListener('click', (e) => {
            transformControl.setMode('rotate');
            document.querySelectorAll('#toolbar .btn:not(.export-btn):not(.undo-redo-btn)').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            statusEl.textContent = 'Mode: Rotate';
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            // Push all current rotations to undo before reset
            Object.entries(initialRotations).forEach(([uuid, rot]) => {
                const data = boneData[uuid];
                if (data) {
                    const currentRot = data.bone.rotation.clone();
                    if (!currentRot.equals(rot)) {
                        pushUndoAction(uuid, currentRot, rot.clone());
                    }
                    data.bone.rotation.copy(rot);
                }
            });
            transformControl.detach();
            selectedBoneUuid = null;
            Object.values(boneData).forEach(d => {
                d.marker.material.color.setHex(0x00ff88);
                d.marker.material.opacity = 0.6;
                d.marker.scale.setScalar(1);
            });
            document.querySelectorAll('.bone-btn').forEach(btn => btn.classList.remove('selected'));
            statusEl.textContent = '✓ Pose reset';
            showToast('↺ Pose reset to default');
        });

        document.getElementById('btn-focus').addEventListener('click', () => {
            orbit.target.set(0, 1, 0);
            camera.position.set(3, 1.5, 4);
            orbit.update();
            statusEl.textContent = '✓ View centered';
        });

        // Undo/Redo buttons
        document.getElementById('btn-undo').addEventListener('click', undo);
        document.getElementById('btn-redo').addEventListener('click', redo);

        // Export dropdown
        const exportBtn = document.getElementById('btn-export');
        const exportMenu = document.getElementById('export-menu');

        exportBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            exportMenu.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            exportMenu.classList.remove('show');
        });

        document.getElementById('export-json').addEventListener('click', () => {
            exportPoseJSON();
            exportMenu.classList.remove('show');
        });

        document.getElementById('export-screenshot').addEventListener('click', () => {
            exportScreenshot();
            exportMenu.classList.remove('show');
        });

        document.getElementById('import-json').addEventListener('click', () => {
            document.getElementById('pose-file-input').click();
            exportMenu.classList.remove('show');
        });

        document.getElementById('pose-file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) importPoseJSON(file);
            e.target.value = '';
        });

        // ============================================================
        // KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            // Don't trigger shortcuts when typing in search
            if (e.target === boneSearchEl) return;

            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z' || e.key === 'Z') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        redo();
                    } else {
                        undo();
                    }
                } else if (e.key === 'y' || e.key === 'Y') {
                    e.preventDefault();
                    redo();
                } else if (e.key === 's' || e.key === 'S') {
                    e.preventDefault();
                    exportPoseJSON();
                }
            }
        });

        // ============================================================
        // WINDOW RESIZE
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================
        // LOAD INITIAL MODEL
        // ============================================================
        showLoader('Loading default model...');
        
        loader.load(
            'https://threejs.org/examples/models/gltf/Xbot.glb',
            (gltf) => processModel(gltf),
            null,
            () => {
                console.log('Using fallback robot model');
                processModel(createRobot());
            }
        );

        // ============================================================
        // ANIMATION LOOP
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);
            orbit.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
